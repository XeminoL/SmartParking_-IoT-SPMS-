<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Parking (HCMUT) - demo</title>
<style>
/* Smart Parking demo. SE aesthetic: serif body, mono for machine data,
   off-white paper, one restrained accent, hairline borders, no shadows. */
:root{
  --paper:#FBFAF7; --panel:#ffffff; --ink:#1A1A1A; --muted:#5A5A52; --faint:#8a8a80;
  --rule:#D8D5CC; --rule2:#c7c3b6; --accent:#2A5DB0; --maroon:#A80036;
  --ok:#3E7D32; --err:#C0392B; --warn:#946A00;
  --serif:Charter, Georgia, Cambria, "Times New Roman", serif;
  --mono:"JetBrains Mono","Cascadia Code","IBM Plex Mono",Consolas,"Courier New",monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0; background:var(--paper); color:var(--ink);
  font-family:var(--serif); font-size:16px; line-height:1.55;
  font-feature-settings:"calt" 1;}
button{font-family:var(--sans); cursor:pointer}
h1,h2,h3{font-family:var(--serif); margin:0 0 8px; font-weight:600; line-height:1.25}
/* anything machine-touchable is mono */
.mono,code,.plate,.money,.pct,.id,.ts,.num{font-family:var(--mono); font-feature-settings:"calt" 1}

/* login */
#login{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:20px}
.login-card{width:440px; max-width:94vw; background:var(--panel); border:1px solid var(--rule); padding:34px 32px}
.login-card h1{font-size:27px; letter-spacing:-.2px}
.login-card p.sub{color:var(--muted); margin:2px 0 22px; font-family:var(--mono); font-size:13px}
.role-pick{display:flex; flex-direction:column}
.role-btn{text-align:left; background:transparent; border:none; border-top:1px solid var(--rule);
  padding:15px 2px; display:block}
.role-btn:last-child{border-bottom:1px solid var(--rule)}
.role-btn:hover{background:#f4f2ec}
.role-btn .t{font-family:var(--serif); font-weight:600; font-size:16px}
.role-btn .t::before{content:"$ "; font-family:var(--mono); color:var(--accent); font-weight:400}
.role-btn .d{font-family:var(--mono); color:var(--muted); font-size:12.5px; margin-top:3px}
.sso-note{margin-top:20px; font-size:13px; color:var(--muted); line-height:1.5}

/* app shell */
#app{display:none}
header.top{display:flex; align-items:center; gap:16px; padding:12px 22px;
  background:var(--paper); border-bottom:1px solid var(--ink)}
header .title{font-family:var(--serif); font-weight:600; font-size:17px}
header .title small{font-family:var(--mono); font-weight:400; color:var(--muted); font-size:11px; margin-left:8px}
header .spacer{flex:1}
.campus-sel,.chip{font-family:var(--mono); background:var(--panel); color:var(--ink);
  border:1px solid var(--rule2); padding:5px 9px; font-size:12.5px; border-radius:2px}
.role-badge{font-family:var(--mono); font-size:12px; color:var(--muted); border:1px solid var(--rule2); padding:4px 9px; border-radius:2px}
.role-badge::before{content:"@"}

.btn{font-family:var(--mono); background:transparent; color:var(--ink); border:1px solid var(--ink);
  padding:6px 14px; font-size:13px; border-radius:2px}
.btn:hover{background:var(--ink); color:var(--paper)}
.btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--rule2)}
.btn.ghost:hover{background:#f4f2ec; color:var(--ink)}
.btn.sm{padding:3px 10px; font-size:12px}
.btn.warn{border-color:var(--maroon); color:var(--maroon)}
.btn.warn:hover{background:var(--maroon); color:#fff}

main{padding:24px 22px; max-width:1120px; margin:0 auto}
.grid{display:grid; gap:22px}
.cols-2{grid-template-columns:1.55fr 1fr}
@media(max-width:960px){.cols-2{grid-template-columns:1fr}}

/* sections are ruled, not carded (no shadow, no rounded box) */
.card{background:transparent; border:none; padding:0; margin-bottom:26px}
.card h2{font-size:16px; margin-bottom:2px; padding-bottom:6px; border-bottom:1.5px solid var(--ink);
  display:flex; align-items:baseline; gap:8px}
.card h2 .hint{margin-left:auto; font-family:var(--mono); font-weight:400; font-size:11px; color:var(--faint)}
.card > *:first-child + *{margin-top:10px}
.section-title{font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin:16px 0 8px}

/* summary: mono figures inline, label under, no tiles */
.summary{display:flex; flex-wrap:wrap; gap:30px; padding:6px 0 2px}
.summary .s .n{font-family:var(--mono); font-size:24px; color:var(--ink); font-feature-settings:"tnum" 1}
.summary .s .l{font-family:var(--sans); font-size:12px; color:var(--muted)}
.summary .s.alarm .n{color:var(--err)}

/* status = mono bracket tag, never a dot */
.tag{font-family:var(--mono); font-size:11.5px; letter-spacing:.02em; white-space:nowrap}
.tag::before{content:"["} .tag::after{content:"]"}
.tag.ok{color:var(--ok)} .tag.warn{color:var(--warn)} .tag.serious{color:#b5561d} .tag.full{color:var(--err)}

/* slot grid: monospace cells, ASCII-ish glyphs */
.slotgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(22px,1fr)); gap:3px; margin-top:8px}
.slot{aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:11px; border:1px solid var(--rule2); border-radius:0}
.slot.free{color:var(--ok)}
.slot.occupied{background:#efece3; color:var(--muted)}
.slot.reserved{color:var(--accent)}
.slot.unknown{color:var(--warn)}
.slot.oos{background:#e8e5dc; color:var(--faint)}
.legend{margin-top:10px; font-family:var(--mono); font-size:12px; color:var(--muted)}

/* booktabs tables: horizontal rules only, no verticals, no zebra */
table{width:100%; border-collapse:collapse; font-size:14px; margin:4px 0}
thead th{font-family:var(--sans); font-weight:600; font-size:11px; letter-spacing:.05em; text-transform:uppercase;
  color:var(--muted); text-align:left; padding:6px 12px 6px 0; border-bottom:1.5px solid var(--ink)}
tbody td{padding:7px 12px 7px 0; border-bottom:1px solid var(--rule)}
tbody tr:last-child td{border-bottom:1.5px solid var(--ink)}
td.num,td .plate,td .money,td .pct{font-family:var(--mono); font-feature-settings:"tnum" 1}
input,select{font-family:var(--mono); background:var(--panel); border:1px solid var(--rule2);
  padding:6px 9px; font-size:13px; color:var(--ink); border-radius:2px}
input:focus,select:focus{outline:1px solid var(--accent); border-color:var(--accent)}
label{font-family:var(--sans); font-size:12px; color:var(--muted); display:block; margin-bottom:4px}

/* alarms: mono, bracket-tagged, hairline top rule, no colored left stripe card */
.alarm-item{display:flex; align-items:baseline; gap:12px; padding:9px 0; border-top:1px solid var(--rule)}
.alarm-item:first-of-type{border-top:none}
.alarm-item .ai-b{flex:1}
.alarm-item .ai-b .t{font-family:var(--mono); font-size:12.5px; color:var(--err)}
.alarm-item .ai-b .t::before{content:"[!] "}
.alarm-item .ai-b .d{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:2px}

/* modal */
#modal{position:fixed; inset:0; background:rgba(26,26,26,.4); display:none; align-items:center; justify-content:center; z-index:60}
.modal-card{width:460px; max-width:94vw; background:var(--panel); border:1px solid var(--ink); padding:24px}
.modal-card h3{font-size:19px; margin-bottom:14px}
.kv{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--rule); font-size:14px}
.kv:last-of-type{border-bottom:none}
.kv .k{color:var(--muted)}
.kv span:last-child{font-family:var(--mono); font-size:13px}
.pay-opts{margin:14px 0}
.pay-opt{font-family:var(--mono); font-size:13px; display:flex; align-items:center; gap:9px; padding:9px 0; border-bottom:1px solid var(--rule)}
.match-ok{font-family:var(--mono); color:var(--ok)} .match-ok::before{content:"[ok] "}
.match-bad{font-family:var(--mono); color:var(--err)} .match-bad::before{content:"[!] "}

/* tabs: text tabs with a rule, no pill, no fill */
.tabs{display:flex; gap:22px; margin-bottom:20px; border-bottom:1px solid var(--rule)}
.tab{font-family:var(--sans); background:transparent; border:none; border-bottom:2px solid transparent;
  color:var(--muted); padding:7px 0; font-size:13.5px; margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink); font-weight:600; border-bottom-color:var(--accent)}
.muted{color:var(--muted)}
.sim-ctl{display:flex; align-items:center; gap:12px}
.pill{font-family:var(--mono); font-size:12px; color:var(--muted)}
footer{font-family:var(--mono); color:var(--faint); font-size:12px; padding:22px; border-top:1px solid var(--rule); margin-top:20px}
.disclaimer{font-family:var(--mono); border:1px solid var(--rule2); border-left:none; padding:9px 12px;
  font-size:12px; color:var(--muted); margin-top:12px}
.disclaimer::before{content:"NOTE  "; font-weight:700; color:var(--ink)}
</style>
</head>
<body>

<!-- login -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div><h1>Smart Parking</h1></div>
    </div>
    <p class="sub">HCMUT campus, SE252 demo</p>
    <div class="role-pick">
      <button class="role-btn" onclick="app.login('driver')">
        <span><span class="t">Sign in as a driver</span><br><span class="d">Nguyễn Văn A, student</span></span>
      </button>
      <button class="role-btn" onclick="app.login('operator')">
        <span><span class="t">Sign in as an operator</span><br><span class="d">board, alarms, visitor tickets</span></span>
      </button>
      <button class="role-btn" onclick="app.login('admin')">
        <span><span class="t">Sign in as an admin</span><br><span class="d">fees, zones, reports</span></span>
      </button>
    </div>
    <p class="sso-note">Login is faked in this demo. The real one would go through the university login (HCMUT_SSO).</p>
  </div>
</div>

<!-- app -->
<div id="app">
  <header class="top">
    <div class="title">Smart Parking <small>HCMUT</small></div>
    <select class="campus-sel" id="campusSel" onchange="app.render()">
      <option value="LTK">Lý Thường Kiệt</option>
      <option value="DA">Dĩ An</option>
    </select>
    <div class="spacer"></div>
    <span class="pill" id="clock">--:--:--</span>
    <span class="role-badge" id="roleBadge">-</span>
    <span class="chip" id="userChip">-</span>
    <button class="btn ghost sm" onclick="app.logout()">Logout</button>
  </header>

  <main id="main"></main>

  <footer>
    A single-file demo, data is in the code, no backend. SE252 project.
  </footer>
</div>

<div id="modal"><div class="modal-card" id="modalCard"></div></div>

<script src="app.js"></script>
</body>
</html>
