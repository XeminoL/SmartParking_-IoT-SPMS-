<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Parking (HCMUT) - demo</title>
<style>
/* styles for the parking demo */
body{
  background:#f0f0f0; color:#000;
  font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:1.4;
  margin:0;
}
button{font-family:inherit; cursor:pointer}
h1,h2,h3{margin:0 0 6px}

/* login */
#login{position:fixed; inset:0; display:flex; align-items:center; justify-content:center}
.login-card{width:380px; max-width:92vw; background:#fff; border:1px solid #999; padding:20px}
.login-card h1{font-size:20px}
.login-card p.sub{color:#555; margin:0 0 16px; font-size:13px}
.role-pick{display:flex; flex-direction:column; gap:8px}
.role-btn{text-align:left; background:#f0f0f0; border:1px solid #999; padding:10px 12px}
.role-btn:hover{background:#e5e5e5}
.role-btn .t{font-weight:bold}
.role-btn .d{color:#555; font-size:12px}
.sso-note{margin-top:14px; font-size:12px; color:#666}

/* app shell */
#app{display:none}
header.top{display:flex; align-items:center; gap:14px; padding:8px 14px; background:#ddd; border-bottom:1px solid #999}
header .title{font-weight:bold}
header .title small{display:block; font-weight:normal; color:#555; font-size:11px}
header .spacer{flex:1}
.campus-sel,.chip{background:#fff; border:1px solid #999; padding:5px 8px; font-size:13px}
.role-badge{border:1px solid #999; background:#fff; padding:4px 10px; font-size:12px; font-weight:bold}
.btn{background:#e0e0e0; color:#000; border:1px solid #888; padding:5px 12px; font-size:13px}
.btn:hover{background:#d0d0d0}
.btn.ghost{background:#f4f4f4}
.btn.sm{padding:3px 8px; font-size:12px}
.btn.danger,.btn.warn{background:#e0e0e0}

main{padding:14px; max-width:1200px; margin:0 auto}
.grid{display:grid; gap:14px}
.cols-2{grid-template-columns:1.4fr 1fr}
.cols-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:960px){.cols-2,.cols-3{grid-template-columns:1fr}}

.card{background:#fff; border:1px solid #999; padding:14px; margin-bottom:14px}
.card h2{font-size:15px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #ccc; padding-bottom:5px}
.card h2 .hint{margin-left:auto; font-weight:normal; font-size:11px; color:#777}
.section-title{font-weight:bold; font-size:13px; margin:10px 0 6px}

/* stat tiles */
.tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:10px}
@media(max-width:760px){.tiles{grid-template-columns:repeat(2,1fr)}}
.tile{background:#f4f4f4; border:1px solid #999; padding:10px}
.tile .k{font-size:12px; color:#555}
.tile .v{font-size:22px; font-weight:bold; margin-top:2px}
.tile .v small{font-size:13px; color:#555; font-weight:normal}

/* zones */
.zone-row{display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid #ddd}
.zone-row:last-child{border-bottom:none}
.dot{width:11px; height:11px; flex:none; border:1px solid #666}
.bar{flex:1; height:12px; background:#eee; border:1px solid #bbb}
.bar > i{display:block; height:100%}
.zone-name{width:58px; font-weight:bold}
.zone-free{width:130px; text-align:right; color:#555; font-size:12px}
.zone-guide{width:110px; font-size:12px; color:#a06000}

.s-green{background:#3aa055} .s-yellow{background:#d8b022}
.s-orange{background:#d87a22} .s-red{background:#c23a2a}
.c-green{color:#2a7d3f} .c-yellow{color:#9a7d10}
.c-orange{color:#b5651a} .c-red{color:#b02a1c}

/* slot grid */
.slotgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(26px,1fr)); gap:3px; margin-top:6px}
.slot{aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; font-size:10px; border:1px solid #999}
.slot.free{background:#cdeccd}
.slot.occupied{background:#e8bcbc}
.slot.reserved{background:#d6ccec}
.slot.unknown{background:#eee; color:#888}
.slot.oos{background:#ddd; color:#999}
.legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:#555}
.legend span{display:inline-flex; align-items:center; gap:5px}
.legend i{width:12px; height:12px; border:1px solid #999; display:inline-block}

/* the gate sign */
.signage{background:#000; border:2px solid #333; padding:16px; text-align:center; font-family:"Courier New",monospace; color:#fff}
.signage .lot{color:#aaa; font-size:12px}
.signage .big{font-size:40px; font-weight:bold; margin:6px 0}
.signage .state{font-size:15px; font-weight:bold}
.signage .dirs{color:#aaa; font-size:13px; margin-top:6px}

/* event log */
.feed{max-height:280px; overflow:auto; font-size:12px}
.feed .ev{display:flex; gap:8px; padding:4px 2px; border-bottom:1px solid #eee}
.feed .ev .ts{color:#888; white-space:nowrap}
.feed .ev .msg{flex:1}
.tag{font-size:10px; padding:0 5px; border:1px solid #bbb; background:#f0f0f0; white-space:nowrap}

/* alarms */
.alarm-item{display:flex; align-items:center; gap:10px; padding:8px; border:1px solid #999; margin-bottom:7px; background:#fff}
.alarm-item.crit{background:#fbe8e8; border-color:#c23a2a}
.alarm-item .ai-b{flex:1}
.alarm-item .ai-b .t{font-weight:bold}
.alarm-item .ai-b .d{font-size:12px; color:#555}

/* tables */
table{width:100%; border-collapse:collapse; font-size:12px}
th,td{text-align:left; padding:5px 8px; border:1px solid #bbb}
th{background:#eee; font-weight:bold}
input,select{background:#fff; border:1px solid #999; padding:5px 7px; font-family:inherit; font-size:13px}
label{font-size:12px; color:#555; display:block; margin-bottom:3px}

/* modal */
#modal{position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center}
.modal-card{width:440px; max-width:92vw; background:#fff; border:1px solid #666; padding:18px}
.modal-card h3{font-size:16px}
.kv{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee; font-size:13px}
.kv:last-of-type{border-bottom:none}
.kv .k{color:#555}
.pay-opts{margin:12px 0}
.pay-opt{display:flex; align-items:center; gap:9px; padding:8px 10px; border:1px solid #ccc; margin-bottom:6px}
.match-ok{color:#2a7d3f; font-weight:bold}
.match-bad{color:#b02a1c; font-weight:bold}

/* tabs */
.tabs{display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap}
.tab{background:#e0e0e0; border:1px solid #888; padding:5px 12px; font-size:13px}
.tab.active{background:#fff; font-weight:bold; border-bottom:2px solid #444}
.muted{color:#555}
.sim-ctl{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.pill{font-size:12px; padding:2px 8px; background:#eee; border:1px solid #bbb; color:#555}
footer{color:#777; font-size:12px; text-align:center; padding:16px}
.disclaimer{background:#f7f7e8; border:1px solid #ccc; padding:8px 10px; font-size:12px; color:#555; margin-top:10px}
</style>
</head>
<body>

<!-- login -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div><h1>Smart Parking</h1></div>
    </div>
    <p class="sub">HCMUT campus, SE252 demo</p>
    <div class="role-pick">
      <button class="role-btn" onclick="app.login('driver')">
        <span><span class="t">Sign in as a driver</span><br><span class="d">Nguyễn Văn A, student</span></span>
      </button>
      <button class="role-btn" onclick="app.login('operator')">
        <span><span class="t">Sign in as an operator</span><br><span class="d">board, alarms, visitor tickets</span></span>
      </button>
      <button class="role-btn" onclick="app.login('admin')">
        <span><span class="t">Sign in as an admin</span><br><span class="d">fees, zones, reports</span></span>
      </button>
    </div>
    <p class="sso-note">Login is faked in this demo. The real one would go through the university login (HCMUT_SSO).</p>
  </div>
</div>

<!-- app -->
<div id="app">
  <header class="top">
    <div class="title">Smart Parking <small>HCMUT</small></div>
    <select class="campus-sel" id="campusSel" onchange="app.render()">
      <option value="LTK">Lý Thường Kiệt</option>
      <option value="DA">Dĩ An</option>
    </select>
    <div class="spacer"></div>
    <span class="pill" id="clock">--:--:--</span>
    <span class="role-badge" id="roleBadge">-</span>
    <span class="chip" id="userChip">-</span>
    <button class="btn ghost sm" onclick="app.logout()">Logout</button>
  </header>

  <main id="main"></main>

  <footer>
    A single-file demo, data is in the code, no backend. SE252 project.
  </footer>
</div>

<div id="modal"><div class="modal-card" id="modalCard"></div></div>

<script src="app.js"></script>
</body>
</html>
